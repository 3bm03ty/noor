<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline'; media-src https://cdn.islamic.network;">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ayah-font-size-ar: {{FONT_SIZE_AR}};
      --ayah-font-size-en: {{FONT_SIZE_EN}};
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Amiri', serif;
      padding: 24px 28px;
      margin: 0;
      line-height: 1.9;
      background: var(--vscode-editor-background);
      color: var(--vscode-editor-foreground);
      min-height: 100%;
    }
    .container { max-width: 520px; }
    .ayah-ar {
      font-size: var(--ayah-font-size-ar, 1.6rem);
      font-weight: 400;
      direction: rtl;
      margin: 0 0 16px 0;
      line-height: 2;
    }
    .ayah-en {
      font-family: 'Lora', serif;
      font-size: var(--ayah-font-size-en, 1rem);
      direction: ltr;
      margin: 0 0 12px 0;
      opacity: 0.9;
    }
    .meta {
      font-size: 0.85rem;
      color: var(--vscode-descriptionForeground);
      margin: 16px 0 20px 0;
      direction: rtl;
    }
    .emoji { font-size: 1.2em; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .actions button {
      font-family: var(--vscode-font-family);
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid var(--vscode-button-border, transparent);
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      cursor: pointer;
      border-radius: 2px;
    }
    .actions button:hover {
      background: var(--vscode-button-hoverBackground);
    }
    .actions button.secondary {
      background: transparent;
      color: var(--vscode-foreground);
    }
    .actions button.secondary:hover {
      background: var(--vscode-toolbar-hoverBackground);
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="ayah-ar" id="ayah-ar">{{AYAH_AR}}</p>
    <p class="ayah-en" id="ayah-en">{{AYAH_EN}}</p>
    <p class="meta" id="meta"{{META_STYLE}}>{{META}}</p>
    <div class="actions">
      <button data-action="play" class="secondary" id="play-btn">Play</button>
      <button data-action="copy">Copy</button>
      <button data-action="next" class="secondary">Next Ayah</button>
      <button data-action="dismiss" class="secondary">Dismiss</button>
    </div>
  </div>
  <audio id="ayah-audio" style="display:none"></audio>
  <script>var __INIT_AUDIO__ = {{INIT_AUDIO}};</script>
  <script>
    (function() {
      const vscode = acquireVsCodeApi();
      var __init = typeof __INIT_AUDIO__ !== 'undefined' ? __INIT_AUDIO__ : {};
      let audioConfig = { reciter: __init.reciter || 'ar.alafasy', bitrate: __init.bitrate || 64, ayahNumber: __init.ayahNumber || 1 };

      function getAudioUrl() {
        return 'https://cdn.islamic.network/quran/audio/' + audioConfig.bitrate + '/' + audioConfig.reciter + '/' + audioConfig.ayahNumber + '.mp3';
      }

      function playAudio() {
        var num = audioConfig.ayahNumber;
        if (!num || num < 1 || num > 6236) return;
        var audio = document.getElementById('ayah-audio');
        audio.src = getAudioUrl();
        audio.play().catch(function() {});
      }

      document.querySelectorAll('button[data-action]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (btn.dataset.action === 'play') {
            playAudio();
          } else {
            vscode.postMessage({ action: btn.dataset.action });
          }
        });
      });

      window.addEventListener('message', function(event) {
        const msg = event.data;
        if (msg.type === 'update' && msg.ayah) {
          if (msg.fontSizeAr) document.getElementById('ayah-ar').style.fontSize = msg.fontSizeAr;
          if (msg.fontSizeEn) document.getElementById('ayah-en').style.fontSize = msg.fontSizeEn;
          document.getElementById('ayah-ar').textContent = msg.ayah.ar || '';
          document.getElementById('ayah-en').textContent = msg.ayah.en || '';
          var metaEl = document.getElementById('meta');
          if (metaEl) {
            if (msg.showSuraName !== false) {
              var meta = msg.ayah.surahName || msg.ayah.surahEnglishName || '';
              if (msg.ayah.numberInSurah) meta += ' (' + msg.ayah.numberInSurah + ')';
              metaEl.innerHTML = meta ? '<span class="emoji">✨</span> ' + meta : '';
              metaEl.style.display = '';
            } else {
              metaEl.style.display = 'none';
            }
          }
          if (msg.reciter) audioConfig.reciter = msg.reciter;
          if (msg.bitrate) audioConfig.bitrate = msg.bitrate;
          if (msg.ayah && msg.ayah.number) audioConfig.ayahNumber = msg.ayah.number;
          if (msg.autoPlay) playAudio();
        }
      });

      if (__init.autoPlay) playAudio();
    })();
  </script>
</body>
</html>
